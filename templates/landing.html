{% extends "base.html" %}

{% block title %}Login - Rent Reporting Portal{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Credit Boost Portal</h4>
            </div>
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-primary" style="font-size: 3rem;"></i>
                    <h5 class="mt-3">Welcome to Credit Boost Portal</h5>
                    <p class="text-muted">Please select your login type to continue</p>
                </div>
                
                <!-- Login buttons - always show these to let user choose IDP -->
                <div class="d-grid gap-3 mb-3">
                    <a href="/.auth/login/external_oidc?post_login_redirect_uri=/resident/dashboard" class="btn btn-primary btn-lg">
                        <i class="bi bi-person"></i> Resident Login
                    </a>
                </div>
                
                <div class="d-grid gap-3">
                    <a href="/.auth/login/aad?post_login_redirect_uri=/admin/dashboard" class="btn btn-secondary btn-lg">
                        <i class="bi bi-shield-check"></i> Admin Login
                    </a>
                </div>
                
                <div class="text-center mt-4">
                    <small class="text-muted">
                        Secure authentication powered by Microsoft Entra
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
